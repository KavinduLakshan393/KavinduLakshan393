<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">K. Kavindu Lakshan GitHub Profile Header</title>
  <desc id="desc">Animated cyberpunk style GitHub profile banner</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="42%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <linearGradient id="neon" x1="120" y1="80" x2="1080" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#818cf8;#a855f7;#22d3ee" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#818cf8">
        <animate attributeName="stop-color" values="#818cf8;#06b6d4;#22c55e;#818cf8" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#22d3ee;#818cf8;#a855f7" dur="7s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.125 0 0 0 0 0.827 0 0 0 0 0.933 0 0 0 0.75 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#334155" stroke-width="1" opacity="0.35"/>
    </pattern>

    <style>
      .title {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 58px;
        font-weight: 800;
        letter-spacing: 1px;
      }

      .subtitle {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .tag {
        font-family: "Fira Code", Consolas, monospace;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }

      .float-a {
        animation: floatA 6s ease-in-out infinite;
      }

      .float-b {
        animation: floatB 7s ease-in-out infinite;
      }

      .pulse {
        animation: pulse 3.5s ease-in-out infinite;
      }

      .scan {
        animation: scan 5s linear infinite;
      }

      @keyframes floatA {
        0%, 100% { transform: translateY(0px); opacity: 0.85; }
        50% { transform: translateY(-12px); opacity: 1; }
      }

      @keyframes floatB {
        0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.65; }
        50% { transform: translateY(9px) translateX(-8px); opacity: 1; }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.45; }
        50% { opacity: 1; }
      }

      @keyframes scan {
        0% { transform: translateY(-80px); opacity: 0; }
        12% { opacity: 0.5; }
        50% { opacity: 0.18; }
        100% { transform: translateY(430px); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)" opacity="0.55"/>

  <g opacity="0.35">
    <circle cx="112" cy="72" r="120" fill="#0891b2" opacity="0.16" class="float-a"/>
    <circle cx="1055" cy="275" r="150" fill="#7c3aed" opacity="0.14" class="float-b"/>
    <circle cx="980" cy="78" r="65" fill="#22c55e" opacity="0.12" class="pulse"/>
  </g>

  <g filter="url(#glow)" opacity="0.95">
    <path d="M84 274 C226 164 316 318 456 211 C603 99 747 260 893 145 C1002 59 1077 102 1138 70" stroke="url(#neon)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M76 292 C231 199 340 330 480 238 C629 140 735 287 913 184 C1011 128 1087 148 1144 117" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  </g>

  <g class="float-a" opacity="0.95">
    <rect x="84" y="70" width="120" height="42" rx="12" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="104" y="97" class="tag" fill="#67e8f9">&lt;/developer&gt;</text>
  </g>

  <g class="float-b" opacity="0.9">
    <rect x="940" y="246" width="166" height="42" rx="12" fill="#0f172a" stroke="#818cf8" stroke-width="1.5"/>
    <text x="962" y="273" class="tag" fill="#c4b5fd">Scrum Driven</text>
  </g>

  <g opacity="0.85">
    <rect x="120" y="232" width="146" height="40" rx="20" fill="#020617" stroke="#334155"/>
    <text x="145" y="258" class="tag" fill="#e2e8f0">Next.js</text>

    <rect x="286" y="232" width="136" height="40" rx="20" fill="#020617" stroke="#334155"/>
    <text x="314" y="258" class="tag" fill="#e2e8f0">Node.js</text>

    <rect x="442" y="232" width="174" height="40" rx="20" fill="#020617" stroke="#334155"/>
    <text x="467" y="258" class="tag" fill="#e2e8f0">PostgreSQL</text>

    <rect x="636" y="232" width="126" height="40" rx="20" fill="#020617" stroke="#334155"/>
    <text x="664" y="258" class="tag" fill="#e2e8f0">Flutter</text>

    <rect x="782" y="232" width="102" height="40" rx="20" fill="#020617" stroke="#334155"/>
    <text x="815" y="258" class="tag" fill="#e2e8f0">RAG</text>
  </g>

  <text x="600" y="145" text-anchor="middle" class="title" fill="url(#neon)" filter="url(#glow)">K. Kavindu Lakshan</text>
  <text x="600" y="188" text-anchor="middle" class="subtitle" fill="#e5e7eb">Full-Stack Web &amp; Mobile Developer | CS Undergraduate</text>
  <text x="600" y="212" text-anchor="middle" class="tag" fill="#94a3b8">offline-first systems • scalable architecture • polished user experience</text>

  <rect class="scan" x="0" y="0" width="1200" height="42" fill="#22d3ee" opacity="0.12"/>
  <rect x="1" y="1" width="1198" height="358" rx="28" stroke="url(#neon)" stroke-width="2" opacity="0.7"/>
</svg>
